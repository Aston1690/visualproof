name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command, URL type, and minimal reproduction steps. Remove private data.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: VisualProof version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Node 22
    validations:
      required: true
