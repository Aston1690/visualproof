<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">VisualProof — evidence-first visual QA</title>
  <desc id="desc">VisualProof captures desktop and mobile evidence, checks objective interface quality, and creates a shareable report.</desc>
  <rect width="1440" height="720" fill="#0b1220"/>
  <rect x="64" y="56" width="1312" height="608" rx="32" fill="#111b2e" stroke="#253653"/>

  <g transform="translate(112 112)">
    <rect width="56" height="56" rx="16" fill="#2563eb"/>
    <path d="M16 30l8 8 17-19" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="76" y="29" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="700">VisualProof</text>
    <text x="76" y="52" fill="#8fa5c6" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Evidence-first visual QA for every website</text>
  </g>

  <text x="112" y="270" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="64" font-weight="750" letter-spacing="-2">See what broke.</text>
  <text x="112" y="340" fill="#8fa5c6" font-family="Inter, ui-sans-serif, system-ui" font-size="30">Desktop + mobile screenshots, objective checks,</text>
  <text x="112" y="382" fill="#8fa5c6" font-family="Inter, ui-sans-serif, system-ui" font-size="30">and one report your whole team can open.</text>

  <g transform="translate(112 460)" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="600">
    <rect width="178" height="48" rx="24" fill="#172640" stroke="#34527d"/>
    <circle cx="27" cy="24" r="7" fill="#60a5fa"/>
    <text x="46" y="30" fill="#dbeafe">No API key</text>
    <rect x="194" width="214" height="48" rx="24" fill="#172640" stroke="#34527d"/>
    <circle cx="221" cy="24" r="7" fill="#34d399"/>
    <text x="240" y="30" fill="#d1fae5">Runs locally</text>
    <rect x="424" width="250" height="48" rx="24" fill="#172640" stroke="#34527d"/>
    <circle cx="451" cy="24" r="7" fill="#a78bfa"/>
    <text x="470" y="30" fill="#ede9fe">Shareable HTML</text>
  </g>

  <g transform="translate(860 110)" font-family="Inter, ui-sans-serif, system-ui">
    <rect width="412" height="500" rx="24" fill="#f8fafc"/>
    <rect width="412" height="72" rx="24" fill="#eaf0f8"/>
    <rect y="48" width="412" height="24" fill="#eaf0f8"/>
    <circle cx="28" cy="26" r="6" fill="#94a3b8"/>
    <circle cx="49" cy="26" r="6" fill="#94a3b8"/>
    <circle cx="70" cy="26" r="6" fill="#94a3b8"/>
    <text x="28" y="119" fill="#64748b" font-size="13" font-weight="700">VISUALPROOF REPORT</text>
    <circle cx="75" cy="190" r="47" fill="#d1fae5"/>
    <text x="75" y="201" text-anchor="middle" fill="#047857" font-size="34" font-weight="800">88</text>
    <text x="142" y="177" fill="#0f172a" font-size="24" font-weight="750">Strong foundation</text>
    <text x="142" y="205" fill="#64748b" font-size="15">2 high · 1 medium · 2 passes</text>

    <g transform="translate(28 260)">
      <rect width="356" height="70" rx="12" fill="#fff1f2" stroke="#fecdd3"/>
      <circle cx="24" cy="24" r="8" fill="#e11d48"/>
      <text x="44" y="29" fill="#881337" font-size="15" font-weight="700">Horizontal overflow</text>
      <text x="44" y="51" fill="#9f1239" font-size="13">Page extends 32 px beyond the viewport</text>
    </g>
    <g transform="translate(28 344)">
      <rect width="356" height="70" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
      <circle cx="24" cy="24" r="8" fill="#2563eb"/>
      <text x="44" y="29" fill="#1e3a8a" font-size="15" font-weight="700">Mobile evidence captured</text>
      <text x="44" y="51" fill="#1d4ed8" font-size="13">390 × 844 screenshot saved</text>
    </g>
    <text x="28" y="462" fill="#64748b" font-size="13">visualproof audit https://example.com</text>
  </g>
</svg>
